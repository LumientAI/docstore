name: docs

# Validates that the docs site builds cleanly. Actual deployment is handled
# by Read the Docs (which pulls from this repo on its own), so this workflow
# only runs `mkdocs build --strict` to catch broken links and missing pages
# before they reach RTD.

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install docs dependencies
        run: uv sync --extra docs
      - name: Build docs (strict)
        run: uv run mkdocs build --strict
